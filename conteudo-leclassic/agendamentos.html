<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Agendamentos</title>

    <link rel="stylesheet" type="text/css" href="style.css">

</head>

<body>
    <header>
        <img src="img/banner.png"
            alt="Mulher praticando alongamento em estúdio de Pilates com o logo “Le Classic” e o texto “Pilates Clássico”.">
    </header>
    <nav>
        <a href="index.html"> HOME </a>
        <a href="index.html#pag-benefícios"> BENEFÍCOS </a>
        <a href="index.html#pag-características"> CARACTERÍSTICAS</a>
        <a href="index.html#pag-estúdio"> ESTÚDIO </a>
        <a href="agendamentos.html"> AGENDAMENTOS </a>
    </nav>

    <hr id="pag-benefícios" />

    <h1>Agendamentos</h1>

    <p> Agende uma aula experimental Grátis! </p>

    <form name="" method="" action="">
        <label for="nome"> Nome: </label>
        <input id="nome" type="text" name="nome_completo" placeholder="Nome Completo" required autofocus />

        <label for="email"> E-mail: </label>
        <input id="email" type="email" name="email" placeholder="nomeusuario@gmail.com">


        <label for="senha"> Senha: </label>
        <input id="senha" type="password" name="senha" placeholder="Digite sua senha">

        <label for="celular"> Celular: </label>
        <input id="celular" type="tel" name="celular" placeholder="(99) 99999-9999" pattern="\(\d{2}\)\s\d{5}-\d{4}"
            required>


        <label for="data"> Data: </label>
        <input id="data" type="date" name="data">

        <label for="hora"> Hora: </label>
        <input id="hora" type="time" name="hora">

        <label> Aulas: </label>
        <input id="hora" type="number" name="aulas" min="1" max="10" step="1">

        <label for="nivel"> Nível: </label>
        <select id="nivel" name="nivel">
            <option value=""> Selecione </option>
            <option value="iniciante"> Iniciante </option>
            <option value="basico"> Básico </option>
            <option value="intermediario"> Intermediário </option>
            <option value="avançado"> Avançado </option>
        </select>

        <fieldset>
            <legend> Gênero: </legend>
            <input id="masc" type="radio" name="genero" value="masc" /> <label for="masc"> Masculino </label>
            <input id="fem" type="radio" name="genero" value="fem" /> <label for="fem "> Feminino </label>
        </fieldset>

        <fieldset>
            <legend> Atividades: </legend>
            <input id="musc" type="checkbox" name="atividade" value="muscalcao" /> <label for="musc"> Musculação
            </label><br />
            <input id="musc" type="checkbox" name="atividade" value="pilates" /> <label for="pila"> Pilates
            </label><br />
            <input id="pila" type="checkbox" name="atividade" value="yoga" /> <label for="yoga"> Yoga </label><br />
            <input id="corr" type="checkbox" name="atividade" value="corrida" /> <label for="corr"> Corrida </label>
        </fieldset>

        <label for="msg"> Mensagem:</label><br />
        <textarea id="msg"> </textarea>

        <input type="submit" name="botao-agendar" value="AGENDAR" />
        <input type="reset" name="botao-cancelar" value="LIMPAR" />

    </form>

    <p>Atividade Teste - 2026</p>
</body>

</html>
